name: 🚀 Multi-platform Releases

# Builds per-ABI Android APKs and Windows, macOS, and Linux desktop archives
# from nightly/release. Each Android ABI
# (arm64-v8a, armeabi-v7a) builds in its OWN parallel matrix job and downloads
# the pinned prebuilt native TDLib (tdjson) asset from iebb/mithka-tdjson. A
# desktop job compiles the same pinned, patched TDLib source for its host OS.
# A final job creates the version tag from pubspec.yaml and publishes every
# package: nightly creates a dated pre-release, release creates a stable release.
# Before 2026-08-01 UTC, each ABI publishes only a compatibility APK whose
# version code is the normal YYMMDDHH code plus 2000; it is valid for all users.
# The standard APK remains an internal source/fallback and is published only if
# compatibility packaging fails. From 2026-08-01 UTC, only standard APKs are
# produced.
#
# master never builds release packages. The twice-daily sync workflow merges new master
# commits into nightly, increments the patch version once, and dispatches this
# workflow.
#
# Required repository secrets:
#   TELEGRAM_API_ID, TELEGRAM_API_HASH   — baked into lib/config/secrets.dart
#   ANDROID_KEYSTORE_BASE64              — base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD            — store password
#   ANDROID_KEY_PASSWORD                 — key password
#   ANDROID_KEY_ALIAS                    — key alias (e.g. nekoko)
# Without the ANDROID_* secrets the build still runs but is debug-signed.

on:
  push:
    branches: [nightly, release]
  workflow_dispatch:
    inputs:
      desktop_test_only:
        description: Build desktop artifacts without Android or a GitHub release
        required: false
        type: boolean
        default: false

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/nightly' }}

permissions:
  contents: write
  models: read

env:
  # Keep each Mithka release reproducible by pinning an immutable TDLib build.
  TDJSON_RELEASE_TAG: tdlib-1.8.66-1b08c83bc078-rebuild-29623073124-1
  TDJSON_UPSTREAM_SHA: 1b08c83bc07888e4b0a6150d36c1364ff03cf930

jobs:
  prepare:
    name: Read pubspec version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      version_code: ${{ steps.version.outputs.version_code }}
      build_stamp: ${{ steps.version.outputs.build_stamp }}
      compat_build_stamp: ${{ steps.version.outputs.compat_build_stamp }}
      produce_compat_apk: ${{ steps.version.outputs.produce_compat_apk }}
      release_date: ${{ steps.version.outputs.release_date }}
      artifact_label: ${{ steps.version.outputs.artifact_label }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_channel: ${{ steps.version.outputs.release_channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pubspec.yaml
        id: version
        env:
          DESKTOP_TEST_ONLY: ${{ inputs.desktop_test_only }}
        run: |
          raw_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          test -n "$raw_version"
          app_version="${raw_version%%+*}"
          version_code="${raw_version##*+}"
          test "$raw_version" != "$version_code"
          case "$version_code" in
            ''|*[!0-9]*) echo "Invalid Android version code: $version_code" >&2; exit 1 ;;
          esac
          read -r build_stamp build_day release_date release_title_date <<< "$(
            date -u '+%y%m%d%H %y%m%d %Y%m%d %Y-%m-%d'
          )"
          compat_build_stamp="$((10#$build_stamp + 2000))"
          if [ "$((10#$build_day))" -lt 260801 ]; then
            produce_compat_apk="true"
          else
            produce_compat_apk="false"
          fi
          short_sha="${GITHUB_SHA::7}"
          branch_name="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"
          if [ "$DESKTOP_TEST_ONLY" = "true" ]; then
            release_tag="desktop-test-${app_version}-${release_date}-${short_sha}"
            release_name="Mithka $app_version desktop test ($short_sha)"
            release_channel="desktop test"
            artifact_label="${app_version}-desktop-test-${release_date}-${short_sha}"
            prerelease="true"
            make_latest="false"
          else
            case "$branch_name" in
            nightly)
              release_tag="v${app_version}-nightly.${release_date}.${short_sha}"
              release_name="v${app_version} Nightly ${release_title_date} (${short_sha})"
              release_channel="nightly pre-release"
              artifact_label="${app_version}-nightly-${release_date}-${short_sha}"
              prerelease="true"
              make_latest="false"
              ;;
            release)
              release_tag="v$app_version"
              release_name="Mithka $app_version · $release_date"
              release_channel="release"
              artifact_label="${app_version}-${release_date}"
              prerelease="false"
              make_latest="true"
              ;;
            *)
              echo "Unsupported release branch: $branch_name" >&2
              exit 1
              ;;
            esac
          fi
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "build_stamp=$build_stamp" >> "$GITHUB_OUTPUT"
          echo "compat_build_stamp=$compat_build_stamp" >> "$GITHUB_OUTPUT"
          echo "produce_compat_apk=$produce_compat_apk" >> "$GITHUB_OUTPUT"
          echo "release_date=$release_date" >> "$GITHUB_OUTPUT"
          echo "artifact_label=$artifact_label" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_channel=$release_channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$make_latest" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Release tag: $release_tag"
          echo "Release channel: $release_channel"
          echo "Android version code: $version_code"
          echo "GMT build stamp: $build_stamp"
          if [ "$produce_compat_apk" = "true" ]; then
            echo "Compatibility APK version code: $compat_build_stamp"
          else
            echo "Compatibility APK disabled from 2026-08-01 UTC"
          fi
          echo "Release date: $release_date"

  build:
    name: Build ${{ matrix.abi }} APK
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.desktop_test_only }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: android-arm64
          - abi: armeabi-v7a
            target: android-arm
    env:
      TDJSON_REPO: iebb/mithka-tdjson
      # fvp defaults Android MDK downloads to SourceForge nightly builds. Pin a
      # stable MDK release to avoid native-load crashes from broken nightlies.
      FVP_DEPS_URL: https://github.com/wang-bin/mdk-sdk/releases/download/v0.36.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Disable Flutter split-ABI versionCode offsets
        run: |
          constants="$FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/kotlin/FlutterPluginConstants.kt"
          python3 - "$constants" <<'PY'
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          text = path.read_text()
          replacements = {
              "ARCH_ARM32 to 1": "ARCH_ARM32 to 0",
              "ARCH_ARM64 to 2": "ARCH_ARM64 to 0",
              "ARCH_X86_64 to 4": "ARCH_X86_64 to 0",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Could not find {old!r} in {path}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          grep -A8 'ABI_VERSION =' "$constants"

      - name: Install Android NDK 28.2.13676358
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358" >/dev/null 2>&1 || \
          yes | sdkmanager "ndk;28.2.13676358" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Resolve tdjson release
        id: tdjson_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${TDJSON_RELEASE_TAG:-}" ]; then
            tag="$TDJSON_RELEASE_TAG"
          else
            tag="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$TDJSON_REPO/releases?per_page=100" \
              | python3 -c '
          import json, sys
          required = {
              "tdjson-android-arm64-v8a.zip",
              "tdjson-android-armeabi-v7a.zip",
              "tdjson-android-x86_64.zip",
          }
          releases = json.load(sys.stdin)
          print(next(
              release["tag_name"]
              for release in releases
              if required.issubset({
                  asset["name"] for asset in release.get("assets", [])
              })
          ))
          ')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset_url=https://github.com/$TDJSON_REPO/releases/download/$tag/tdjson-android-${{ matrix.abi }}.zip" >> "$GITHUB_OUTPUT"
          echo "Using tdjson release $tag"

      - name: Cache jniLibs (${{ matrix.abi }})
        id: jnilibs-cache
        uses: actions/cache@v5
        with:
          path: android/app/src/main/jniLibs/${{ matrix.abi }}
          key: jnilibs-${{ runner.os }}-${{ steps.tdjson_release.outputs.tag }}-${{ matrix.abi }}
          restore-keys: |
            jnilibs-${{ runner.os }}-

      - name: Check cached tdjson
        id: tdjson
        run: |
          if [ -s "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so" ]; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
            ls -lh "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prebuilt tdjson (${{ matrix.abi }})
        if: steps.tdjson.outputs.cached != 'true'
        run: |
          mkdir -p "android/app/src/main/jniLibs/${{ matrix.abi }}"
          curl -fsSL "${{ steps.tdjson_release.outputs.asset_url }}" -o /tmp/tdjson-android.zip
          unzip -q -o /tmp/tdjson-android.zip -d /tmp/tdjson-android
          install -m 0644 "/tmp/tdjson-android/${{ matrix.abi }}/libtdjson.so" \
            "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so"
          ls -lh "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so"

      - name: Flutter dependencies
        run: flutter pub get

      - name: Write Firebase Android config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          : "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64:?set FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 in repository secrets}"
          mkdir -p android/app
          printf '%s' "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Write secrets.dart
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = ${TELEGRAM_API_ID:-0};
            static const String apiHash = '${TELEGRAM_API_HASH}';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        if: ${{ env.KEYSTORE_B64 != '' }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=${KEY_PASSWORD:-$STORE_PASSWORD}
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build ${{ matrix.abi }} release APK
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build apk --release --split-per-abi \
            --target-platform ${{ matrix.target }} \
            --build-name="${{ needs.prepare.outputs.app_version }}" \
            --build-number="${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="GIT_COMMIT=${{ needs.prepare.outputs.short_sha }}" \
            --dart-define="CI_BUILD_STAMP=${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="SENTRY_DSN=$SENTRY_DSN"

      - name: Verify APK version code
        run: |
          apk="build/app/outputs/flutter-apk/app-${{ matrix.abi }}-release.apk"
          analyzer="$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer"
          if [ ! -x "$analyzer" ]; then
            analyzer="$(command -v apkanalyzer)"
          fi
          actual_version_code="$("$analyzer" manifest version-code "$apk")"
          expected_version_code="${{ needs.prepare.outputs.build_stamp }}"
          if [ "$actual_version_code" != "$expected_version_code" ]; then
            echo "Expected APK version code $expected_version_code, got $actual_version_code" >&2
            exit 1
          fi
          echo "APK version code: $actual_version_code"

      - name: Verify APK native ABI contents
        run: |
          apk="build/app/outputs/flutter-apk/app-${{ matrix.abi }}-release.apk"
          bad_entries="$(
            zipinfo -1 "$apk" \
              | grep '^lib/' \
              | grep -v "^lib/${{ matrix.abi }}/" \
              || true
          )"
          if [ -n "$bad_entries" ]; then
            echo "APK contains native libraries outside ${{ matrix.abi }}:" >&2
            echo "$bad_entries" >&2
            exit 1
          fi
          echo "APK native libraries are limited to ${{ matrix.abi }}"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp "build/app/outputs/flutter-apk/app-${{ matrix.abi }}-release.apk" \
            "dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-vc${{ needs.prepare.outputs.build_stamp }}-release.apk"

      - name: Patch and re-sign ${{ matrix.abi }} compatibility APK (+2000 version code)
        id: compatibility_apk
        if: needs.prepare.outputs.produce_compat_apk == 'true'
        continue-on-error: true
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          standard_apk="dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-vc${{ needs.prepare.outputs.build_stamp }}-release.apk"
          compat_apk="dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-vc${{ needs.prepare.outputs.compat_build_stamp }}-compat-release.apk"
          compat_work="$RUNNER_TEMP/mithka-compat-${{ matrix.abi }}"
          unsigned_apk="$compat_work/compat-unsigned.apk"
          aligned_apk="$compat_work/compat-aligned.apk"
          mkdir -p "$compat_work"

          # AndroidManifest.xml is binary AXML. Patch only its typed
          # android:versionCode value, rewrite the ZIP container without the old
          # signatures, then align and sign it with the same key as the standard
          # APK. Dart, native libraries, resources, and assets are not rebuilt.
          python3 - \
            "$standard_apk" \
            "$unsigned_apk" \
            "${{ needs.prepare.outputs.build_stamp }}" \
            "${{ needs.prepare.outputs.compat_build_stamp }}" <<'PY'
          import struct
          import sys
          import zipfile

          source_path, output_path, expected_raw, replacement_raw = sys.argv[1:]
          expected = int(expected_raw)
          replacement = int(replacement_raw)
          if not (0 < expected <= 2_100_000_000):
              raise SystemExit(f"Invalid source version code: {expected}")
          if replacement != expected + 2000 or replacement > 2_100_000_000:
              raise SystemExit(
                  f"Invalid compatibility version code: {replacement} (source {expected})"
              )

          RES_XML_TYPE = 0x0003
          RES_XML_RESOURCE_MAP_TYPE = 0x0180
          RES_XML_START_ELEMENT_TYPE = 0x0102
          VERSION_CODE_RESOURCE_ID = 0x0101021B
          NO_INDEX = 0xFFFFFFFF
          INTEGER_TYPES = {0x10, 0x11}

          def chunk_header(data: bytearray, offset: int) -> tuple[int, int, int]:
              if offset < 0 or offset + 8 > len(data):
                  raise SystemExit(f"Truncated AXML chunk header at {offset}")
              chunk_type, header_size, chunk_size = struct.unpack_from(
                  "<HHI", data, offset
              )
              if header_size < 8 or chunk_size < header_size:
                  raise SystemExit(f"Invalid AXML chunk at {offset}")
              return chunk_type, header_size, chunk_size

          def is_v1_signature(name: str) -> bool:
              upper = name.upper()
              if not upper.startswith("META-INF/"):
                  return False
              leaf = upper.rsplit("/", 1)[-1]
              return leaf == "MANIFEST.MF" or leaf.endswith(
                  (".SF", ".RSA", ".DSA", ".EC")
              )

          with zipfile.ZipFile(source_path, "r") as source_apk:
              manifest = bytearray(source_apk.read("AndroidManifest.xml"))
              root_type, root_header_size, root_size = chunk_header(manifest, 0)
              if root_type != RES_XML_TYPE or root_size > len(manifest):
                  raise SystemExit("AndroidManifest.xml is not a valid binary AXML file")

              resource_ids: list[int] = []
              patched = 0
              offset = root_header_size
              while offset < root_size:
                  chunk_type, header_size, chunk_size = chunk_header(manifest, offset)
                  chunk_end = offset + chunk_size
                  if chunk_end > root_size:
                      raise SystemExit(f"AXML chunk at {offset} extends past the root")

                  if chunk_type == RES_XML_RESOURCE_MAP_TYPE:
                      payload_size = chunk_size - header_size
                      if payload_size % 4:
                          raise SystemExit("Invalid AXML resource map size")
                      resource_ids = list(
                          struct.unpack_from(
                              f"<{payload_size // 4}I", manifest, offset + header_size
                          )
                      )
                  elif chunk_type == RES_XML_START_ELEMENT_TYPE:
                      extension = offset + header_size
                      if extension + 20 > chunk_end:
                          raise SystemExit("Truncated AXML start-element extension")
                      attribute_start, attribute_size, attribute_count = struct.unpack_from(
                          "<HHH", manifest, extension + 8
                      )
                      if attribute_size < 20:
                          raise SystemExit("Invalid AXML attribute size")
                      attributes = extension + attribute_start
                      if attributes + attribute_size * attribute_count > chunk_end:
                          raise SystemExit("AXML attributes extend past their chunk")

                      for index in range(attribute_count):
                          attribute = attributes + index * attribute_size
                          name_index = struct.unpack_from("<I", manifest, attribute + 4)[0]
                          if (
                              name_index >= len(resource_ids)
                              or resource_ids[name_index] != VERSION_CODE_RESOURCE_ID
                          ):
                              continue

                          raw_value = struct.unpack_from("<I", manifest, attribute + 8)[0]
                          value_size = struct.unpack_from("<H", manifest, attribute + 12)[0]
                          value_type = manifest[attribute + 15]
                          current = struct.unpack_from("<I", manifest, attribute + 16)[0]
                          if raw_value != NO_INDEX or value_size != 8:
                              raise SystemExit("Unexpected encoded android:versionCode value")
                          if value_type not in INTEGER_TYPES:
                              raise SystemExit("android:versionCode is not an integer")
                          if current != expected:
                              raise SystemExit(
                                  f"Expected version code {expected}, found {current}"
                              )
                          struct.pack_into("<I", manifest, attribute + 16, replacement)
                          patched += 1

                  offset = chunk_end

              if patched != 1:
                  raise SystemExit(
                      f"Expected one android:versionCode attribute, patched {patched}"
                  )

              with zipfile.ZipFile(
                  output_path, "w", allowZip64=True, strict_timestamps=False
              ) as output_apk:
                  output_apk.comment = source_apk.comment
                  for entry in source_apk.infolist():
                      if is_v1_signature(entry.filename):
                          continue
                      payload = (
                          manifest
                          if entry.filename == "AndroidManifest.xml"
                          else source_apk.read(entry.filename)
                      )
                      output_apk.writestr(entry, payload)

          print(f"Patched version code {expected} -> {replacement}")
          PY

          build_tools="$(
            find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d \
              | grep -E '/[0-9]+(\.[0-9]+){2}$' \
              | sort -V \
              | tail -1 \
              || true
          )"
          if [ -z "$build_tools" ]; then
            build_tools="$(
              find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d \
                | sort -V \
                | tail -1
            )"
          fi
          zipalign="$build_tools/zipalign"
          apksigner="$build_tools/apksigner"
          test -x "$zipalign"
          test -x "$apksigner"
          "$zipalign" -f 4 "$unsigned_apk" "$aligned_apk"

          if [ -s android/app/upload-keystore.jks ]; then
            test -n "$STORE_PASSWORD"
            test -n "$KEY_ALIAS"
            signing_keystore="android/app/upload-keystore.jks"
            signing_alias="$KEY_ALIAS"
            export APKSIGNER_STORE_PASSWORD="$STORE_PASSWORD"
            export APKSIGNER_KEY_PASSWORD="${KEY_PASSWORD:-$STORE_PASSWORD}"
          else
            signing_keystore="${ANDROID_USER_HOME:-$HOME/.android}/debug.keystore"
            signing_alias="androiddebugkey"
            export APKSIGNER_STORE_PASSWORD="android"
            export APKSIGNER_KEY_PASSWORD="android"
          fi
          test -s "$signing_keystore"

          "$apksigner" sign \
            --ks "$signing_keystore" \
            --ks-key-alias "$signing_alias" \
            --ks-pass env:APKSIGNER_STORE_PASSWORD \
            --key-pass env:APKSIGNER_KEY_PASSWORD \
            --out "$compat_apk" \
            "$aligned_apk"
          "$apksigner" verify --verbose --print-certs "$compat_apk"

          analyzer="$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer"
          if [ ! -x "$analyzer" ]; then
            analyzer="$(command -v apkanalyzer)"
          fi
          actual_version_code="$("$analyzer" manifest version-code "$compat_apk")"
          expected_version_code="${{ needs.prepare.outputs.compat_build_stamp }}"
          if [ "$actual_version_code" != "$expected_version_code" ]; then
            echo "Expected compatibility APK version code $expected_version_code, got $actual_version_code" >&2
            exit 1
          fi

          bad_entries="$(
            zipinfo -1 "$compat_apk" \
              | grep '^lib/' \
              | grep -v "^lib/${{ matrix.abi }}/" \
              || true
          )"
          if [ -n "$bad_entries" ]; then
            echo "Compatibility APK contains native libraries outside ${{ matrix.abi }}:" >&2
            echo "$bad_entries" >&2
            exit 1
          fi

          standard_cert="$(
            "$apksigner" verify --print-certs "$standard_apk" \
              | awk -F': ' '/certificate SHA-256 digest:/ { print $NF; exit }'
          )"
          compat_cert="$(
            "$apksigner" verify --print-certs "$compat_apk" \
              | awk -F': ' '/certificate SHA-256 digest:/ { print $NF; exit }'
          )"
          test -n "$standard_cert"
          test "$compat_cert" = "$standard_cert"
          echo "Compatibility APK version code: $actual_version_code"
          echo "Compatibility APK re-signed with the standard APK certificate: $compat_cert"

      - name: Upload compatibility APK artifact
        id: compatibility_upload
        if: needs.prepare.outputs.produce_compat_apk == 'true' && steps.compatibility_apk.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: apk-compat-${{ matrix.abi }}-${{ needs.prepare.outputs.release_date }}-${{ needs.prepare.outputs.compat_build_stamp }}
          path: dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-vc${{ needs.prepare.outputs.compat_build_stamp }}-compat-release.apk
          if-no-files-found: error

      - name: Upload standard APK artifact
        if: needs.prepare.outputs.produce_compat_apk != 'true' || steps.compatibility_apk.outcome == 'failure' || steps.compatibility_upload.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: apk-standard-${{ matrix.abi }}-${{ needs.prepare.outputs.release_date }}-${{ needs.prepare.outputs.build_stamp }}
          path: dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-vc${{ needs.prepare.outputs.build_stamp }}-release.apk
          if-no-files-found: error

      - name: Report compatibility APK publication failure
        if: needs.prepare.outputs.produce_compat_apk == 'true' && (steps.compatibility_apk.outcome == 'failure' || steps.compatibility_upload.outcome == 'failure')
        run: |
          echo "::warning::Compatibility APK publication failed for ${{ matrix.abi }}; the standard APK was uploaded and will still be released."
          echo "### Compatibility APK publication warning" >> "$GITHUB_STEP_SUMMARY"
          echo "The ${{ matrix.abi }} compatibility APK failed to publish, but the standard APK was uploaded and will still be released." >> "$GITHUB_STEP_SUMMARY"

  build-desktop:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      FVP_DEPS_URL: https://github.com/wang-bin/mdk-sdk/releases/download/v0.36.0
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            label: Linux x64
            os: ubuntu-24.04
            architecture: x64
            library: libtdjson.so
            archive_extension: tar.gz
          - platform: macos
            label: macOS universal
            os: macos-15
            architecture: universal
            library: libtdjson.dylib
            archive_extension: zip
          - platform: windows
            label: Windows x64
            os: windows-2022
            architecture: x64
            library: tdjson.dll
            archive_extension: zip
    steps:
      - uses: actions/checkout@v5

      - name: Check out pinned Mithka TDLib patches
        uses: actions/checkout@v5
        with:
          repository: iebb/mithka-tdjson
          ref: ${{ env.TDJSON_RELEASE_TAG }}
          path: .tdlib-helper

      - name: Normalize Windows TDLib patch line endings
        if: matrix.platform == 'windows'
        shell: bash
        run: sed -i 's/\r$//' .tdlib-helper/patches/*.patch

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake gperf libcurl4-openssl-dev libgtk-3-dev liblzma-dev \
            libsecret-1-dev libssl-dev ninja-build pkg-config zlib1g-dev

      - name: Install macOS build dependencies
        if: matrix.platform == 'macos'
        run: brew install cmake ninja

      - name: Install Windows native dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            openssl:x64-windows-static zlib:x64-windows-static

      - name: Restore desktop TDLib cache
        id: tdlib_cache
        uses: actions/cache/restore@v5
        with:
          path: .tdlib-build/desktop-${{ matrix.platform }}
          key: tdjson-${{ matrix.platform }}-${{ matrix.architecture }}-${{ env.TDJSON_RELEASE_TAG }}-${{ hashFiles('scripts/build-tdjson-desktop.sh') }}

      - name: Build patched desktop TDLib
        shell: bash
        env:
          NATIVE_HELPER_ROOT: .tdlib-helper
          TD_COMMIT: ${{ env.TDJSON_UPSTREAM_SHA }}
          TD_BUILD_JOBS: '2'
        run: |
          scripts/build-tdjson-desktop.sh \
            "${{ matrix.platform }}" \
            "native-libs/${{ matrix.library }}"

      - name: Save desktop TDLib cache
        if: steps.tdlib_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .tdlib-build/desktop-${{ matrix.platform }}
          key: tdjson-${{ matrix.platform }}-${{ matrix.architecture }}-${{ env.TDJSON_RELEASE_TAG }}-${{ hashFiles('scripts/build-tdjson-desktop.sh') }}

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Write secrets.dart
        shell: bash
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = ${TELEGRAM_API_ID:-0};
            static const String apiHash = '${TELEGRAM_API_HASH}';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Refresh macOS CocoaPods specs
        if: matrix.platform == 'macos'
        working-directory: macos
        run: pod install --repo-update

      - name: Build Linux release
        if: matrix.platform == 'linux'
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build linux --release \
            --build-name="${{ needs.prepare.outputs.app_version }}" \
            --build-number="${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="GIT_COMMIT=${{ needs.prepare.outputs.short_sha }}" \
            --dart-define="CI_BUILD_STAMP=${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="SENTRY_DSN=$SENTRY_DSN"

      - name: Build macOS release
        if: matrix.platform == 'macos'
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build macos --release \
            --build-name="${{ needs.prepare.outputs.app_version }}" \
            --build-number="${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="GIT_COMMIT=${{ needs.prepare.outputs.short_sha }}" \
            --dart-define="CI_BUILD_STAMP=${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="SENTRY_DSN=$SENTRY_DSN"

      - name: Build Windows release
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build windows --release `
            --build-name="${{ needs.prepare.outputs.app_version }}" `
            --build-number="${{ needs.prepare.outputs.build_stamp }}" `
            --dart-define="GIT_COMMIT=${{ needs.prepare.outputs.short_sha }}" `
            --dart-define="CI_BUILD_STAMP=${{ needs.prepare.outputs.build_stamp }}" `
            --dart-define="SENTRY_DSN=$env:SENTRY_DSN"

      - name: Package Linux release
        if: matrix.platform == 'linux'
        run: |
          bundle="build/linux/x64/release/bundle"
          install -m 0755 native-libs/libtdjson.so "$bundle/lib/libtdjson.so"
          nm -D "$bundle/lib/libtdjson.so" | grep ' td_create_client_id$'
          if ldd "$bundle/lib/libtdjson.so" | grep -q 'not found'; then
            ldd "$bundle/lib/libtdjson.so" >&2
            exit 1
          fi
          mkdir -p dist/package/Mithka
          cp -R "$bundle/." dist/package/Mithka/
          tar -C dist/package -czf \
            "dist/mithka-${{ needs.prepare.outputs.artifact_label }}-linux-x64.tar.gz" \
            Mithka

      - name: Package macOS release
        if: matrix.platform == 'macos'
        run: |
          app="build/macos/Build/Products/Release/Mithka.app"
          frameworks="$app/Contents/Frameworks"
          install -m 0755 native-libs/libtdjson.dylib \
            "$frameworks/libtdjson.dylib"
          test "$(lipo -archs "$frameworks/libtdjson.dylib" | tr ' ' '\n' | sort | tr '\n' ' ')" = "arm64 x86_64 "
          if otool -L "$frameworks/libtdjson.dylib" | grep -q '/opt/homebrew\|/usr/local'; then
            otool -L "$frameworks/libtdjson.dylib" >&2
            exit 1
          fi
          codesign --force --sign - "$frameworks/libtdjson.dylib"
          codesign --force --sign - \
            --entitlements macos/Runner/Release.entitlements "$app"
          codesign --verify --deep --strict "$app"
          mkdir -p dist
          ditto -c -k --keepParent "$app" \
            "dist/mithka-${{ needs.prepare.outputs.artifact_label }}-macos-universal.zip"

      - name: Package Windows release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $bundle = "build\windows\x64\runner\Release"
          Copy-Item "native-libs\tdjson.dll" "$bundle\tdjson.dll"
          Add-Type -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;
          public static class NativeLibraryCheck {
            [DllImport("kernel32", SetLastError = true, CharSet = CharSet.Unicode)]
            public static extern IntPtr LoadLibrary(string path);
            [DllImport("kernel32", SetLastError = true)]
            public static extern IntPtr GetProcAddress(IntPtr module, string name);
            [DllImport("kernel32", SetLastError = true)]
            public static extern bool FreeLibrary(IntPtr module);
          }
          '@
          $module = [NativeLibraryCheck]::LoadLibrary((Resolve-Path "$bundle\tdjson.dll"))
          if ($module -eq [IntPtr]::Zero) {
            throw "Could not load packaged tdjson.dll: $([Runtime.InteropServices.Marshal]::GetLastWin32Error())"
          }
          $requiredSymbols = @(
            "td_create_client_id",
            "td_mithka_export_session_string",
            "td_mithka_import_session_string",
            "td_mithka_last_error",
            "td_mithka_set_transfer_boost"
          )
          foreach ($symbol in $requiredSymbols) {
            if ([NativeLibraryCheck]::GetProcAddress($module, $symbol) -eq [IntPtr]::Zero) {
              throw "Packaged tdjson.dll does not export $symbol"
            }
          }
          [void][NativeLibraryCheck]::FreeLibrary($module)
          New-Item -ItemType Directory -Force dist\package | Out-Null
          Copy-Item $bundle dist\package\Mithka -Recurse
          Compress-Archive -Path dist\package\Mithka `
            -DestinationPath "dist\mithka-${{ needs.prepare.outputs.artifact_label }}-windows-x64.zip"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.platform }}-${{ needs.prepare.outputs.release_date }}
          path: dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.platform }}-${{ matrix.architecture }}.${{ matrix.archive_extension }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.desktop_test_only }}
    needs: [prepare, build, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all release packages
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify and list artifacts
        env:
          PRODUCE_COMPAT_APK: ${{ needs.prepare.outputs.produce_compat_apk }}
        run: |
          ls -lhR release-assets
          standard_apk_count="$(
            find release-assets -maxdepth 1 -type f \
              -name '*-release.apk' ! -name '*-compat-release.apk' \
              | wc -l \
              | tr -d ' '
          )"
          compat_apk_count="$(
            find release-assets -maxdepth 1 -type f -name '*-compat-release.apk' \
              | wc -l \
              | tr -d ' '
          )"
          total_apk_count=$((standard_apk_count + compat_apk_count))
          if [ "$total_apk_count" -ne 2 ]; then
            echo "Expected one published APK per ABI, found $total_apk_count" >&2
            exit 1
          fi
          for abi in arm64-v8a armeabi-v7a; do
            abi_apk_count="$(
              find release-assets -maxdepth 1 -type f -name "*-${abi}-vc*-release.apk" \
                | wc -l \
                | tr -d ' '
            )"
            if [ "$abi_apk_count" -ne 1 ]; then
              echo "Expected exactly one published $abi APK, found $abi_apk_count" >&2
              exit 1
            fi
          done
          if [ "$PRODUCE_COMPAT_APK" != "true" ] && \
            { [ "$standard_apk_count" -ne 2 ] || [ "$compat_apk_count" -ne 0 ]; }; then
            echo "Only standard APKs may be published from 2026-08-01 UTC" >&2
            exit 1
          fi
          for desktop_asset in \
            '*-windows-x64.zip' \
            '*-macos-universal.zip' \
            '*-linux-x64.tar.gz'; do
            desktop_asset_count="$(
              find release-assets -maxdepth 1 -type f -name "$desktop_asset" \
                | wc -l \
                | tr -d ' '
            )"
            if [ "$desktop_asset_count" -ne 1 ]; then
              echo "Expected exactly one $desktop_asset package, found $desktop_asset_count" >&2
              exit 1
            fi
          done
          echo "STANDARD_APK_COUNT=$standard_apk_count" >> "$GITHUB_ENV"
          echo "COMPAT_APK_COUNT=$compat_apk_count" >> "$GITHUB_ENV"
          echo "Standard APKs: $standard_apk_count"
          echo "Compatibility APKs: $compat_apk_count"

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          fi
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "$RELEASE_TAG"

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          BUILD_STAMP: ${{ needs.prepare.outputs.build_stamp }}
          COMPAT_BUILD_STAMP: ${{ needs.prepare.outputs.compat_build_stamp }}
          PRODUCE_COMPAT_APK: ${{ needs.prepare.outputs.produce_compat_apk }}
        run: |
          : > change-summary.md
          if [ "$PRERELEASE" = "true" ]; then
            previous_tag="$(
              git tag --list 'v*-nightly.*' --sort=-creatordate \
                | awk -v current="$RELEASE_TAG" \
                  '$0 != current && !found { print; found=1 }'
            )"
            if [ -n "$previous_tag" ] && \
              git merge-base --is-ancestor "$previous_tag" "$GITHUB_SHA"; then
              change_range="$previous_tag..$GITHUB_SHA"
              compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${RELEASE_TAG}"
              compare_label="$previous_tag...$RELEASE_TAG"
            else
              change_range="$GITHUB_SHA^1..$GITHUB_SHA"
              compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}"
              compare_label="$RELEASE_TAG commits"
            fi

            git log --reverse --no-merges --max-count=100 \
              --format='Commit: %H%nSubject: %s%nDetails: %b' \
              --stat=100,80 "$change_range" -- . \
              ':(exclude).github/**' \
              ':(exclude)test/**' \
              ':(exclude)integration_test/**' \
              ':(exclude)ios/RunnerTests/**' \
              | awk '!/^Subject: chore: sync nightly /' \
              > changes.txt

            git log --reverse --no-merges \
              --format='- %s ([%h]('"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"'/commit/%H))' \
              "$change_range" -- . ':(exclude).github/**' \
              | grep -v '^- chore: sync nightly ' \
              > fallback-items.txt \
              || true
            {
              echo "## Changes"
              echo "### English"
              if [ -s fallback-items.txt ]; then
                cat fallback-items.txt
              else
                echo "- Maintenance and reliability improvements."
              fi
              echo
              echo "### 中文"
              echo "- 维护和可靠性改进；详细内容请参阅完整变更记录。"
            } > change-summary.md

            jq -n --rawfile changes changes.txt '{
              model: "openai/gpt-4.1",
              messages: [
                {
                  role: "system",
                  content: "Write concise bilingual Markdown release notes for app users using only facts in the supplied git history. Use exactly this structure: ## Changes, then ### English with 1 to 6 English bullet points, then ### 中文 with faithful Simplified Chinese translations of the same bullet points in the same order. Combine related commits and make every bullet a distinct user-visible change. Focus on features, fixes, reliability, privacy, and performance. Do not invent or repeat changes. Omit tests, implementation details, commit hashes, generated version bumps, and CI-only changes. If there are no user-visible changes, use one maintenance and reliability bullet in each language. Do not add an introduction or conclusion."
                },
                { role: "user", content: $changes }
              ],
              temperature: 0,
              max_tokens: 900
            }' > model-request.json

            if model_response="$(
              curl -fsS --retry 1 --retry-all-errors \
                --connect-timeout 10 --max-time 30 \
                https://models.github.ai/inference/chat/completions \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H 'Content-Type: application/json' \
                --data-binary @model-request.json
            )" && model_notes="$(
              jq -er '.choices[0].message.content | select(startswith("## Changes") and contains("### English") and contains("### 中文"))' \
                <<< "$model_response"
            )"; then
              printf '%s\n' "$model_notes" > change-summary.md
              echo "Generated bilingual nightly release notes with GitHub Models"
            else
              echo "GitHub Models unavailable; using bilingual fallback release notes" >&2
            fi
          fi

          : > release-notes.md
          if [ -s change-summary.md ]; then
            cat change-summary.md >> release-notes.md
            echo >> release-notes.md
          fi

          {
            echo "## Android APKs / Android APK"
            if [ "$PRODUCE_COMPAT_APK" = "true" ] && [ "$COMPAT_APK_COUNT" -eq 2 ]; then
              echo "- **English:** This pre-August release contains only compatibility APKs with version code \`$COMPAT_BUILD_STAMP\`. They are valid for every user, including new installs and normal updates. Choose only the APK matching your device ABI. From 2026-08-01 UTC, releases return to the standard version code."
              echo "- **中文：** 本次 8 月前的发布仅提供版本代码为 \`$COMPAT_BUILD_STAMP\` 的兼容 APK。它们适用于所有用户，包括新安装和常规更新。只需选择与设备 ABI 匹配的 APK。从 2026-08-01 UTC 起，发布将恢复使用标准版本代码。"
            elif [ "$PRODUCE_COMPAT_APK" = "true" ]; then
              echo "- **English:** Compatibility publication passed for $COMPAT_APK_COUNT of 2 ABIs. This release still contains exactly one APK per ABI: the \`vc$COMPAT_BUILD_STAMP\` compatibility APK where available, or the \`vc$BUILD_STAMP\` standard fallback otherwise. A compatibility APK works for every user. A standard fallback may be rejected only when updating from an older offset build. Choose the file matching your device ABI."
              echo "- **中文：** 2 种 ABI 中有 $COMPAT_APK_COUNT 种成功发布了兼容 APK。本次发布对每种 ABI 仍只提供一个 APK：成功时为 \`vc$COMPAT_BUILD_STAMP\` 兼容 APK，否则为 \`vc$BUILD_STAMP\` 标准后备 APK。兼容 APK 适用于所有用户；只有从较旧的偏移版本更新时，标准后备 APK 才可能被 Android 判定为降级。请选择与设备 ABI 匹配的文件。"
            else
              echo "- **English:** Only the standard APK is produced from 2026-08-01 UTC. The temporary compatibility APK is no longer generated. Choose the APK matching your device ABI."
              echo "- **中文：** 从 2026-08-01 UTC 起仅生成标准 APK，不再生成临时兼容 APK。请选择与设备 ABI 匹配的 APK。"
            fi
            echo
            echo "## Desktop / 桌面端"
            echo "- **English:** Windows x64, universal macOS (Apple silicon and Intel), and Linux x64 archives include the pinned TDLib runtime. The macOS archive is ad-hoc signed and not notarized."
            echo "- **中文：** Windows x64、通用 macOS（Apple 芯片和 Intel）及 Linux x64 压缩包均包含固定版本的 TDLib 运行库。macOS 压缩包使用临时签名，未经公证。"
            if [ "$PRERELEASE" = "true" ]; then
              echo
              echo "**Full changelog:** [$compare_label]($compare_url)"
            fi
          } >> release-notes.md

      - name: Remove old Mithka package assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' \
            | grep -E '^mithka-.*\.(apk|zip|tar\.gz)$' \
            | while read -r asset; do
                gh release delete-asset "$RELEASE_TAG" "$asset" --yes
              done

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          make_latest: ${{ needs.prepare.outputs.make_latest }}
          body_path: release-notes.md
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Notify Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CI_CHANNEL: ${{ secrets.TELEGRAM_CI_CHANNEL }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.release_channel }}
          RELEASE_DATE: ${{ needs.prepare.outputs.release_date }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CI_CHANNEL"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          notes = Path("release-notes.md").read_text(encoding="utf-8")
          summary_lines = []
          for raw_line in notes.splitlines():
              line = raw_line.strip()
              if not line or line == "## Changes":
                  continue
              if line.startswith("**Full changelog:**"):
                  break
              if line.startswith("### "):
                  line = f"{line[4:]}:"
              elif line.startswith("## "):
                  line = line[3:]
              elif line.startswith("- "):
                  line = f"• {line[2:]}"
              line = re.sub(r"\[([^]]+)]\([^)]+\)", r"\1", line)
              line = line.replace("**", "").replace("`", "")
              summary_lines.append(line)

          header = (
              f"🚀 Mithka {os.environ['RELEASE_CHANNEL']} "
              f"{os.environ['RELEASE_TAG']} · {os.environ['RELEASE_DATE']}"
          )
          footer = f"Downloads: {os.environ['RELEASE_URL']}"
          summary = "\n".join(summary_lines)
          if summary:
              # Telegram accepts at most 4096 characters. Leave extra room for
              # UTF-16 counting differences around emoji and future labels.
              available = 3800 - len(header) - len(footer) - len("\n\nSummary:\n\n")
              if len(summary) > available:
                  summary = summary[: max(0, available - 1)].rstrip() + "…"
              message = f"{header}\n\nSummary:\n{summary}\n\n{footer}"
          else:
              message = f"{header}\n\n{footer}"

          Path("telegram-message.txt").write_text(message, encoding="utf-8")
          PY
          response="$(curl -fsS \
            --data-urlencode "chat_id=$TELEGRAM_CI_CHANNEL" \
            --data-urlencode "text@telegram-message.txt" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage")"
          # Release CI announcements should stay in the channel history but not
          # become pinned. If another automation or Telegram-side behavior pins
          # the just-sent message, unpin that exact message best-effort.
          message_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("result", {}).get("message_id", ""))' <<< "$response")"
          if [ -n "$message_id" ]; then
            curl -fsS \
              -F "chat_id=$TELEGRAM_CI_CHANNEL" \
              -F "message_id=$message_id" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/unpinChatMessage" \
              >/dev/null 2>&1 || true
          fi
